name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + Dev-Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff safety

      - name: Run Black (Code Formatting) – nur Hinweis
        run: black --check . || echo "⚠️  Black würde den Code anders formatieren (nicht kritisch)"
        continue-on-error: true

      - name: Run Ruff (Linting)
        run: ruff check .

      - name: Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Safety (Dependency Vulnerability Scan)
        run: safety check --full-report || true
        continue-on-error: true

      - name: Python Syntax Check
        run: python -m pycompile $(find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*")

      - name: Summary
        run: echo "✅ CI Pipeline erfolgreich durchgelaufen (Black ist nur noch Hinweis)"